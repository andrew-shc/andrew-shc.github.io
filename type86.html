<button class="t86-switch" id="t86-switch" aria-label="Toggle dark mode">
    <div class="t86-plate">
        <div class="t86-rocker">
            <div class="t86-nub"></div>
            <svg class="t86-indicator" viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg" overflow="visible">
                <circle class="t86-led" cx="10" cy="10" r="4.5"/>
            </svg>
        </div>
    </div>
</button>
<script>
(function () {
    var btn = document.getElementById('t86-switch');

    function isDark() {
        /* Palette is inverted: quarto-light (primary) = dark, quarto-dark (alternate) = light.
           The button should show "dark" when the page is visually dark = NOT in alternate. */
        var s = localStorage.getItem('quarto-color-scheme');
        return s !== 'alternate';
    }

    function sync() { btn.classList.toggle('t86-dark', isDark()); }

    btn.addEventListener('click', function () {
        try { window.quartoToggleColorScheme(); } catch (e) {}
        setTimeout(sync, 30);
    });

    /* Initial sync after Quarto's own theme scripts have settled */
    setTimeout(sync, 0);

    /* Stay in sync with OS preference changes */
    if (window.matchMedia)
        window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', sync);

    /* Watch Quarto's toggle in case it changes independently */
    setTimeout(function () {
        var qt = document.querySelector('.quarto-color-scheme-toggle');
        if (qt) new MutationObserver(sync).observe(qt, { attributes: true });
    }, 200);
})();
</script>
<script>
/* Quarto adds .anchored to h2+ but skips h1.
   setTimeout(fn,0) defers until after all DOMContentLoaded handlers
   (including Quarto's anchorJS.add('.anchored') pass) have completed. */
window.document.addEventListener('DOMContentLoaded', function () {
    setTimeout(function () {
        document.querySelectorAll('section.level1[id] > h1').forEach(function (h1) {
            var id = h1.closest('section.level1').id;
            h1.setAttribute('data-anchor-id', id);
            h1.classList.add('anchored');
        });
        if (window.AnchorJS) {
            var h1anchors = new window.AnchorJS();
            h1anchors.options = { placement: 'right', icon: '' };
            h1anchors.add('h1.anchored');
        }
    }, 0);
});
</script>
